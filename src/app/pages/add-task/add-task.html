<div class="max-w-md mx-auto mt-12 p-8 bg-white rounded-2xl shadow-lg border border-gray-100">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Task</h2>

  <form [formGroup]="taskForm" class="space-y-4" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1"> Title </label>

      <input
        id="title"
        formControlName="title"
        type="text"
        placeholder="Enter task title..."
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      />

      @if (taskForm.controls.title.touched && taskForm.controls.title.invalid) {
        <p class="text-red-500 text-sm mt-1">Title is required</p>
      }
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1"> Description </label>

      <textarea
        formControlName="description"
        placeholder="Enter task description..."
        class="w-full px-4 py-2 border rounded-lg h-28 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
      ></textarea>

      @if (taskForm.controls.description.touched && taskForm.controls.description.invalid) {
        <p class="text-red-500 text-sm mt-1">Description is required</p>
      }
    </div>

    <button
      type="submit"
      [disabled]="taskForm.invalid"
      class="w-full p-2 rounded-lg text-white transition cursor-pointer"
      [class.bg-blue-500]="!taskForm.invalid"
      [class.hover:bg-blue-600]="!taskForm.invalid"
      [class.bg-gray-400]="taskForm.invalid"
      [class.cursor-not-allowed]="taskForm.invalid"
    >
      Add Task
    </button>
  </form>
</div>
